# Feature registry. Humans bump versions; agents only read.

features:
  - id: ret_1d
    version: v1
    family: returns
    source: ohlcv_1d
    requires: [close]
    params:
      lookback_d: 1
    description: |
      Log-rendement journalier: log(close_t / close_{t-1}).
      Brique de base pour toutes les features construites sur les rendements.
      Premier bar toujours NaN.

  - id: mom_20d
    version: v1
    family: returns
    source: ohlcv_1d
    requires: [close]
    params:
      window_d: 20
    description: |
      Momentum 20 jours: somme des log-rendements journaliers sur 20 jours.
      Équivalent à log(close_t / close_{t-20}).
      Positif = trend haussier récent, négatif = trend baissier.
  - id: rv_30d
    version: v1
    family: volatility
    source: ohlcv_1d
    requires: [close]
    params:
      window_d: 30
    description: |
      Rolling 30-day annualized realized volatility from daily log-returns.
      Computed as std(log_returns, 30) * sqrt(365). Non-negative.

  - id: cvd_20d
    version: v1
    family: momentum
    source: ohlcv_1d
    requires: [taker_buy_vol, volume]
    params:
      window_d: 20
    description: |
      Rolling 20-day cumulative volume delta (net taker buy pressure),
      normalized by average volume. Positive = sustained buying pressure.
      Range is unbounded; typical values are [-2, 2].

  - id: funding_zscore_14d
    version: v1
    family: derivatives
    source: derivative_ticker
    requires: [funding_rate]
    params:
      lookback_d: 14
    description: |
      Z-score of the 8h-funding-rate vs its 14-day rolling mean / std.
      Returns empty series when funding_rate column is absent (e.g. ohlcv_1d).
      Extreme positive => longs paying heavily; extreme negative => shorts paying.

  - id: rel_mom_20d
    version: v1
    family: momentum
    source: ohlcv_1d
    requires: [close]
    params:
      window_mom: 20
      window_norm: 252
      lookback_d: 272
    description: |
      Z-scored 20-day momentum. Computes close(t)/close(t-20)-1 then
      normalises by its 252-day rolling mean and std. Positive = unusually
      strong recent momentum relative to own history. Comparable cross-asset.

  - id: reversal_5d
    version: v1
    family: momentum
    source: ohlcv_1d
    requires: [close]
    params:
      window_d: 5
      lookback_d: 5
    description: |
      5-day short-term reversal: -(close(t)/close(t-5) - 1).
      Positive = asset has sold off recently, expected to rebound.
      Captures mean-reversion over 1-week horizon.

  - id: taker_ratio_20d
    version: v1
    family: momentum
    source: ohlcv_1d
    requires: [taker_buy_vol, volume]
    params:
      window_d: 20
      lookback_d: 20
    description: |
      Z-scored taker buy volume ratio over 20 days.
      ratio(t) = taker_buy_vol(t) / volume(t), then z-scored rolling 20d.
      Positive = unusual buying pressure relative to recent history.

  - id: risk_adj_ret_20d
    version: v1
    family: momentum
    source: ohlcv_1d
    requires: [close]
    params:
      window_ret: 20
      window_norm: 252
      lookback_d: 272
    description: |
      Z-scored Sharpe-like ratio: 20d cumulative return / 20d realized vol,
      normalized over 252-day rolling window. Rewards assets with high
      returns relative to their volatility.

  - id: hl_range_20d
    version: v1
    family: volatility
    source: ohlcv_1d
    requires: [high, low, close]
    params:
      window_d: 20
      window_norm: 252
      lookback_d: 272
    description: |
      Z-scored 20-day rolling high-low range ratio: mean((high-low)/close, 20d),
      normalized over 252d. High values = elevated intraday activity.

  - id: dist_from_high_20d
    version: v1
    family: momentum
    source: ohlcv_1d
    requires: [close]
    params:
      window_d: 20
      lookback_d: 20
    description: |
      Distance from 20-day rolling high: close/max(close,20d) - 1.
      Always <= 0. Near 0 = at the high, strongly negative = far below high.
      Mean-reversion signal for oversold assets.

  - id: vol_ratio_20d
    version: v1
    family: momentum
    source: ohlcv_1d
    requires: [volume]
    params:
      window_d: 20
      window_norm: 252
      lookback_d: 272
    description: |
      Z-scored volume ratio: volume(t) / avg_volume_20d, normalized over
      252-day rolling window. Positive = unusually high volume activity.

  - id: trades_zscore_20d
    version: v1
    family: momentum
    source: ohlcv_1d
    requires: [n_trades]
    params:
      window_d: 20
      lookback_d: 20
    description: |
      Z-scored daily trade count over 20-day rolling window.
      Positive = unusually high market participation.

  - id: zscore_ret_composite
    version: v1
    family: returns
    source: ohlcv_1d
    requires: [close]
    params:
      windows: [15, 30, 60, 80, 100, 150, 200, 250, 300]
      method: rolling
      lookback_d: 300
    description: |
      Composite z-score of daily simple returns, averaged across multiple
      rolling windows [15, 30, 60, 80, 100, 150, 200, 250, 300 days]. At each date t:
        z_w(t) = (ret(t) - mu_w(t)) / sigma_w(t)   (rolling mean & std)
        composite(t) = mean(z_15, ..., z_300)
      Averaging across windows reduces sensitivity to any single lookback.
      Positive = return above average across all scales (momentum signal).
      Set method=ewm in params to switch to exponential weighting.

  - id: obi_0_5pct
    version: v1
    family: microstructure
    source: book_snapshot_25
    requires: [bid_price_0, ask_price_0, bid_size_0, ask_size_0]
    params:
      depth_pct: 0.5
    description: |
      Order book imbalance within 0.5% of the mid-price. Range [-1, 1].
      Positive = bid-side dominance (buying pressure). Requires L2 snapshot
      data; returns empty for ohlcv_1d source.
